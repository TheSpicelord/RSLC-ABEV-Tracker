<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABEV Tracker — 2026 General Election</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="style.css?v=20260718b" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-title-row">
      <h1>Absentee &amp; Early Vote Tracker <span class="title-election">2026 General Election</span></h1>
      <div class="topbar-badges">
        <span id="sampleBadge" class="sample-badge" hidden>SAMPLE DATA</span>
        <span id="updatedBadge" class="updated-badge" hidden></span>
      </div>
    </div>
    <div class="topbar-layout">
      <div class="topbar-left">
        <div class="controls-row controls-row-primary">
          <span class="control-label-inline">State</span>
          <select id="stateSelect">
            <option value="">Select State...</option>
          </select>
          <button id="exitStateBtn" type="button" hidden>Exit State</button>
          <div class="chamber-buttons">
            <button id="houseChamberBtn" type="button">Lower Chamber</button>
            <button id="senateChamberBtn" type="button">Upper Chamber</button>
          </div>
          <div id="statViewButtons" class="stat-view-buttons"></div>
        </div>
      </div>
    </div>
  </header>

  <main class="layout">
    <section id="map"></section>
    <aside class="sidebar">
      <h2 id="detailsTitle">National Overview</h2>
      <div id="details"><div class="loading-indicator">Loading ABEV data...</div></div>
    </aside>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/shpjs@latest/dist/shp.min.js"></script>
  <script type="module" src="app.js?v=20260718b"></script>
</body>
</html>
